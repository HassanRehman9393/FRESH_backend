[pytest]
# Pytest configuration for FRESH Backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 7.0

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --asyncio-mode=auto

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may need external services)
    auth: Authentication tests
    detection: Fruit detection tests
    disease: Disease detection tests
    weather: Weather-related tests
    orchards: Orchard management tests
    images: Image handling tests
    alerts: Alert system tests
    slow: Tests that take significant time
    requires_ml_api: Tests requiring ML API
    requires_db: Tests requiring database connection

# Async settings
asyncio_mode = auto

# Coverage settings
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */fresh_env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
